# fly.toml - mingle-stt Fly.io configuration
app = "mingle-stt"
primary_region = "nrt"  # Tokyo (한국에서 가장 가까운 리전)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false   # 상시 실행 (슬립 없음)
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
